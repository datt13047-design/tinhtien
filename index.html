<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ tính tiền</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .calculator-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }
        
        h2 {
            color: #333;
            margin-top: 0;
            margin-bottom: 25px;
        }
        
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }
        
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="number"]:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 15px;
        }
        
        button:hover {
            background-color: #0056b3;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        
        .result-label {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 5px;
        }
        
        #total-amount {
            font-size: 24px;
            font-weight: bold;
            color: #d9534f;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <h2>Tính Tiền Dịch Vụ</h2>
        
        <div class="input-group">
            <label for="hours">Số giờ:</label>
            <input type="number" id="hours" min="0" placeholder="0" value="0">
        </div>
        
        <div class="input-group">
            <label for="minutes">Số phút:</label>
            <input type="number" id="minutes" min="0" max="59" placeholder="0" value="0">
        </div>
        
        <button onclick="calculateMoney()">Tính Thành Tiền</button>
        
        <div class="result-box">
            <div class="result-label">Tổng cộng:</div>
            <div id="total-amount">0 VNĐ</div>
        </div>
    </div>

    <script>
        function calculateMoney() {
            // Lấy giá trị từ ô input, nếu người dùng để trống thì mặc định là 0
            const hours = parseInt(document.getElementById('hours').value) || 0;
            const minutes = parseInt(document.getElementById('minutes').value) || 0;
            
            // Định nghĩa mức giá
            const ratePerHour = 120000;
            const ratePerMinute = ratePerHour / 60; // Tính ra 2.000 VNĐ mỗi phút
            
            // Tính tổng tiền
            const total = (hours * ratePerHour) + (minutes * ratePerMinute);
            
            // Hàm toLocaleString('vi-VN') giúp định dạng số có dấu chấm phân cách hàng nghìn (VD: 120.000)
            const formattedTotal = total.toLocaleString('vi-VN');
            
            // Hiển thị kết quả ra màn hình
            document.getElementById('total-amount').innerText = formattedTotal + ' VNĐ';
        }
    </script>

</body>
</html>
