<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ tính tiền theo giờ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .calculator-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 380px;
        }
        
        h2 {
            color: #333;
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }
        
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="number"]:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
        }

        .time-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .time-row input {
            text-align: center;
        }

        .time-colon {
            font-size: 20px;
            font-weight: bold;
            color: #777;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 5px;
        }
        
        button:hover {
            background-color: #218838;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            text-align: center;
        }
        
        .info-text {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 10px;
            font-style: italic;
        }
        
        .result-label {
            font-size: 15px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        #total-amount {
            font-size: 26px;
            font-weight: bold;
            color: #d9534f;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <!-- Đã sửa tiêu đề -->
        <h2>Tính Tiền</h2>
        
        <div class="input-group">
            <label>Đơn giá mỗi giờ (VNĐ):</label>
            <input type="number" id="hourly-rate" value="120000" min="0" step="1000">
        </div>
        
        <div class="input-group">
            <label>Giờ bắt đầu:</label>
            <div class="time-row">
                <input type="number" id="start-h" placeholder="Giờ" min="0" max="23">
                <span class="time-colon">:</span>
                <input type="number" id="start-m" placeholder="Phút" min="0" max="59">
            </div>
        </div>
        
        <div class="input-group">
            <label>Giờ kết thúc:</label>
            <div class="time-row">
                <input type="number" id="end-h" placeholder="Giờ" min="0" max="23">
                <span class="time-colon">:</span>
                <input type="number" id="end-m" placeholder="Phút" min="0" max="59">
            </div>
        </div>
        
        <button onclick="calculateMoney()">Tính Thành Tiền</button>
        
        <div class="result-box">
            <div id="time-duration" class="info-text">Chưa có dữ liệu</div>
            <!-- Đã sửa nhãn hiển thị tiền -->
            <div class="result-label">Số tiền:</div>
            <div id="total-amount">0 VNĐ</div>
        </div>
    </div>

    <script>
        function calculateMoney() {
            const hourlyRate = parseFloat(document.getElementById('hourly-rate').value) || 0;
            
            const startH = parseInt(document.getElementById('start-h').value) || 0;
            const startM = parseInt(document.getElementById('start-m').value) || 0;
            const endH = parseInt(document.getElementById('end-h').value) || 0;
            const endM = parseInt(document.getElementById('end-m').value) || 0;

            if (startH > 23 || endH > 23 || startM > 59 || endM > 59) {
                alert("Vui lòng nhập định dạng giờ (0-23) và phút (0-59) hợp lệ!");
                return;
            }

            let startTotalMins = (startH * 60) + startM;
            let endTotalMins = (endH * 60) + endM;

            if (endTotalMins < startTotalMins) {
                endTotalMins += (24 * 60);
            }

            if (startTotalMins === 0 && endTotalMins === 0) {
                document.getElementById('time-duration').innerText = `Vui lòng nhập thời gian`;
                document.getElementById('total-amount').innerText = `0 VNĐ`;
                return;
            }

            const durationMins = endTotalMins - startTotalMins;
            const ratePerMinute = hourlyRate / 60;
            const totalMoney = Math.round(durationMins * ratePerMinute); 

            const displayHours = Math.floor(durationMins / 60);
            const displayMinutes = durationMins % 60;

            document.getElementById('time-duration').innerText = `Từ ${startH}h${startM.toString().padStart(2, '0')} đến ${endH}h${endM.toString().padStart(2, '0')} (Tổng: ${displayHours} giờ ${displayMinutes} phút)`;
            document.getElementById('total-amount').innerText = totalMoney.toLocaleString('vi-VN') + ' VNĐ';
        }
    </script>

</body>
</html>
