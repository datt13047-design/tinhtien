<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Tính Tiền Sân</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .header-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: flex;
            justify-content: flex-end; /* Đẩy input giá tiền sang góc phải vì đã xóa thẻ h1 */
            align-items: center;
        }

        .rate-input {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rate-input label {
            font-weight: bold;
            font-size: 16px;
        }

        .rate-input input {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #3498db;
            border-radius: 8px;
            width: 150px;
            text-align: right;
            outline: none;
        }

        /* Lưới 4 đồng hồ */
        .timers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .timer-card {
            background-color: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 5px solid #3498db;
            transition: transform 0.2s;
        }

        .timer-card:hover { transform: translateY(-5px); }
        .timer-card.active {
            border-top-color: #e74c3c;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.2);
        }

        .table-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .time-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 36px;
            font-weight: bold;
            color: #34495e;
            margin-bottom: 10px;
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        .cost-display {
            font-size: 22px;
            font-weight: bold;
            color: #27ae60;
            margin-bottom: 20px;
            min-height: 26px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }

        button:active { transform: scale(0.95); }
        .btn-start { background-color: #3498db; }
        .btn-start:hover { background-color: #2980b9; }
        .btn-stop { background-color: #e74c3c; }
        .btn-stop:hover { background-color: #c0392b; }
        .btn-reset { background-color: #95a5a6; }
        .btn-reset:hover { background-color: #7f8c8d; }

        /* Giao diện Lịch sử tính tiền */
        .history-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eef2f5;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .history-header h2 {
            margin: 0;
            font-size: 20px;
            color: #2c3e50;
        }

        .btn-clear-history {
            background-color: #e74c3c;
            padding: 8px 15px;
            font-size: 14px;
            flex: none;
            width: auto;
        }

        .btn-clear-history:hover {
            background-color: #c0392b;
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .history-time { font-size: 13px; color: #7f8c8d; }
        .history-name { font-weight: bold; font-size: 16px; color: #2c3e50; }
        .history-duration { font-size: 14px; color: #34495e; }
        
        .history-cost {
            font-size: 20px;
            font-weight: bold;
            color: #27ae60;
        }

    </style>
</head>
<body>

    <div class="header-container">
        <div class="rate-input">
            <label for="hourlyRate">Đơn giá / 1 Giờ (VNĐ):</label>
            <input type="number" id="hourlyRate" value="120000" min="0" step="1000" onchange="saveData()">
        </div>
    </div>

    <div class="timers-grid" id="timers-container"></div>

    <div class="history-container">
        <div class="history-header">
            <h2>Lịch Sử Tính Tiền</h2>
            <button class="btn-clear-history" onclick="clearHistory()">Xóa Lịch Sử</button>
        </div>
        <ul class="history-list" id="history-list">
            <!-- Lịch sử sẽ hiện ở đây -->
        </ul>
    </div>

    <script>
        let timers = [
            { id: 0, name: "Sân 1", isRunning: false, elapsedTime: 0, startTime: 0, interval: null },
            { id: 1, name: "Sân 2", isRunning: false, elapsedTime: 0, startTime: 0, interval: null },
            { id: 2, name: "Sân 3", isRunning: false, elapsedTime: 0, startTime: 0, interval: null },
            { id: 3, name: "Sân 4", isRunning: false, elapsedTime: 0, startTime: 0, interval: null }
        ];

        let historyData = [];

        function saveData() {
            const dataToSave = timers.map(t => ({
                id: t.id,
                isRunning: t.isRunning,
                elapsedTime: t.elapsedTime,
                startTime: t.startTime
            }));
            localStorage.setItem('quanlygio_data', JSON.stringify(dataToSave));
            localStorage.setItem('quanlygio_rate', document.getElementById('hourlyRate').value);
            localStorage.setItem('quanlygio_history', JSON.stringify(historyData));
        }

        function loadData() {
            const savedData = localStorage.getItem('quanlygio_data');
            const savedRate = localStorage.getItem('quanlygio_rate');
            const savedHistory = localStorage.getItem('quanlygio_history');

            if (savedRate) {
                document.getElementById('hourlyRate').value = savedRate;
            }

            if (savedHistory) {
                historyData = JSON.parse(savedHistory);
                renderHistory();
            }

            if (savedData) {
                const parsedData = JSON.parse(savedData);
                parsedData.forEach((saved, index) => {
                    timers[index].isRunning = saved.isRunning;
                    timers[index].elapsedTime = saved.elapsedTime;
                    timers[index].startTime = saved.startTime;
                });
            }
        }

        window.onload = function() {
            loadData();
            
            const container = document.getElementById('timers-container');
            timers.forEach((timer, index) => {
                container.innerHTML += `
                    <div class="timer-card" id="card-${index}">
                        <div class="table-name">${timer.name}</div>
                        <div class="time-display" id="time-${index}">00:00:00</div>
                        <div class="cost-display" id="cost-${index}">---</div>
                        <div class="btn-group">
                            <button class="btn-start" id="btn-toggle-${index}" onclick="toggleTimer(${index})">Bắt đầu</button>
                            <button class="btn-reset" onclick="resetTimer(${index})">Thanh toán</button>
                        </div>
                    </div>
                `;
            });

            timers.forEach((timer, index) => {
                if (timer.isRunning) {
                    timer.interval = setInterval(() => updateDisplay(index), 1000);
                    const btn = document.getElementById(`btn-toggle-${index}`);
                    btn.innerText = "Dừng lại";
                    btn.className = "btn-stop";
                    document.getElementById(`card-${index}`).classList.add("active");
                    document.getElementById(`cost-${index}`).innerText = "Đang chạy...";
                    updateDisplay(index); 
                } else if (timer.elapsedTime > 0) {
                    updateDisplay(index);
                    calculateCost(index); 
                    const btn = document.getElementById(`btn-toggle-${index}`);
                    btn.innerText = "Tiếp tục";
                    btn.className = "btn-start";
                }
            });
        };

        function formatTime(ms) {
            let totalSeconds = Math.floor(ms / 1000);
            let hours = Math.floor(totalSeconds / 3600);
            let minutes = Math.floor((totalSeconds % 3600) / 60);
            let seconds = totalSeconds % 60;
            return String(hours).padStart(2, '0') + ':' + String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
        }

        function updateDisplay(index) {
            const timer = timers[index];
            let currentElapsed = timer.elapsedTime;
            
            if (timer.isRunning) {
                currentElapsed += (Date.now() - timer.startTime);
            }
            document.getElementById(`time-${index}`).innerText = formatTime(currentElapsed);
        }

        function calculateCost(index) {
            const timer = timers[index];
            const hourlyRate = parseFloat(document.getElementById('hourlyRate').value) || 0;
            const hoursUsed = timer.elapsedTime / (1000 * 60 * 60);
            const totalCost = Math.round(hoursUsed * hourlyRate);
            document.getElementById(`cost-${index}`).innerText = totalCost.toLocaleString('vi-VN') + " VNĐ";
            return totalCost.toLocaleString('vi-VN') + " VNĐ";
        }

        function toggleTimer(index) {
            const timer = timers[index];
            const btn = document.getElementById(`btn-toggle-${index}`);
            const card = document.getElementById(`card-${index}`);
            
            if (!timer.isRunning) {
                // Tùy chỉnh câu hỏi dựa vào việc sân đã có thời gian chạy trước đó chưa
                const msg = timer.elapsedTime === 0 
                    ? `Bắt đầu tính tiền cho ${timer.name}?` 
                    : `Tiếp tục tính tiền cho ${timer.name}?`;

                if (confirm(msg)) {
                    timer.isRunning = true;
                    timer.startTime = Date.now();
                    timer.interval = setInterval(() => updateDisplay(index), 1000);
                    
                    btn.innerText = "Dừng lại";
                    btn.className = "btn-stop";
                    card.classList.add("active");
                    document.getElementById(`cost-${index}`).innerText = "Đang chạy...";
                    saveData();
                }
            } else {
                if (confirm(`Dừng và xuất hóa đơn cho ${timer.name}?`)) {
                    timer.isRunning = false;
                    timer.elapsedTime += Date.now() - timer.startTime;
                    clearInterval(timer.interval);
                    
                    calculateCost(index);
                    
                    btn.innerText = "Tiếp tục";
                    btn.className = "btn-start";
                    card.classList.remove("active");
                    saveData();
                }
            }
        }

        function resetTimer(index) {
            const timer = timers[index];
            if (timer.isRunning) {
                alert(`Vui lòng DỪNG tính giờ cho ${timer.name} trước khi thanh toán!`);
                return;
            }

            if (timer.elapsedTime === 0) {
                alert(`Sân chưa có dữ liệu để thanh toán!`);
                return;
            }

            if (confirm(`Thanh toán cho ${timer.name}?`)) {
                // Lấy thông tin lưu vào lịch sử
                const costText = document.getElementById(`cost-${index}`).innerText;
                const timeText = document.getElementById(`time-${index}`).innerText;
                const now = new Date();
                const dateTimeStr = now.toLocaleTimeString('vi-VN') + ' - ' + now.toLocaleDateString('vi-VN');

                const record = {
                    date: dateTimeStr,
                    name: timer.name,
                    duration: timeText,
                    cost: costText
                };

                // Thêm bản ghi lên đầu mảng lịch sử
                historyData.unshift(record);
                renderHistory();

                // Xóa trắng đồng hồ
                timer.elapsedTime = 0;
                document.getElementById(`time-${index}`).innerText = "00:00:00";
                document.getElementById(`cost-${index}`).innerText = "---";
                
                const btn = document.getElementById(`btn-toggle-${index}`);
                btn.innerText = "Bắt đầu";
                btn.className = "btn-start";
                
                saveData();
            }
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            
            if (historyData.length === 0) {
                list.innerHTML = '<li style="text-align: center; color: #7f8c8d; padding: 20px 0;">Chưa có lịch sử giao dịch</li>';
                return;
            }

            historyData.forEach(item => {
                list.innerHTML += `
                    <li class="history-item">
                        <div class="history-info">
                            <span class="history-time">${item.date}</span>
                            <span class="history-name">${item.name}</span>
                            <span class="history-duration">Thời gian chơi: ${item.duration}</span>
                        </div>
                        <div class="history-cost">${item.cost}</div>
                    </li>
                `;
            });
        }

        function clearHistory() {
            if(confirm('Bạn có chắc chắn muốn xóa toàn bộ lịch sử giao dịch?')) {
                historyData = [];
                renderHistory();
                saveData();
            }
        }
    </script>
</body>
</html>
